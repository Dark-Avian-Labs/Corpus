name: Codex PR Checks

permissions:
  contents: read
  pull-requests: read

env:
  NODE_VERSION: 25

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: useblacksmith/checkout@v1

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Check formatting
        run: pnpm run check-format

      - name: Check linting
        run: pnpm run lint

      - name: Check types
        run: pnpm run typecheck

      - name: Prepare test environment
        env:
          DOTENV_PRIVATE_KEY_DEVELOPMENT: ${{ secrets.DOTENV_PRIVATE_KEY_DEVELOPMENT }}
        run: |
          if [ -n "${DOTENV_PRIVATE_KEY_DEVELOPMENT:-}" ]; then
            echo "USE_DOTENVX=true" >> "$GITHUB_ENV"
          else
            echo "USE_DOTENVX=false" >> "$GITHUB_ENV"
            cp .github/ci.env.development .env.development
            DB_ROOT="${RUNNER_TEMP}/codex-ci-db"
            mkdir -p "$DB_ROOT"
            {
              echo ""
              echo "# CI-only absolute DB paths (core rejects relative CENTRAL_DB_PATH)"
              echo "CENTRAL_DB_PATH=${DB_ROOT}/central.test.db"
              echo "ARMORY_DB_PATH=${DB_ROOT}/armory.test.db"
              echo "WARFRAME_DB_PATH=${DB_ROOT}/warframe.test.db"
              echo "EPIC7_DB_PATH=${DB_ROOT}/epic7.test.db"
            } >> .env.development
            echo "::notice title=CI env::No DOTENV_PRIVATE_KEY_DEVELOPMENT (Dependabot/forks). Using .github/ci.env.development plus RUNNER_TEMP DB paths. Optional: add this secret under Settings → Secrets and variables → Actions → Dependabot to use the committed encrypted .env.development instead."
          fi

      - name: Build project
        env:
          DOTENV_PRIVATE_KEY_DEVELOPMENT: ${{ secrets.DOTENV_PRIVATE_KEY_DEVELOPMENT }}
        run: |
          if [ "$USE_DOTENVX" = "true" ]; then
            pnpm exec dotenvx run --strict -f .env.development -- pnpm run build
          else
            pnpm run build
          fi

      - name: Run tests
        env:
          DOTENV_PRIVATE_KEY_DEVELOPMENT: ${{ secrets.DOTENV_PRIVATE_KEY_DEVELOPMENT }}
        run: |
          if [ "$USE_DOTENVX" = "true" ]; then
            pnpm exec dotenvx run --strict -f .env.development -- pnpm run test
          else
            pnpm run test
          fi
